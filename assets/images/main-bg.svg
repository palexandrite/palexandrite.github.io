<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:svgjs="http://svgjs.dev/svgjs" version="1.1" viewBox="0 0 700 700" width="700" height="700" opacity="1">
	<defs>
		<filter id="nnnoise-filter" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="linearRGB">
			<feTurbulence type="turbulence" baseFrequency="0.1" numOctaves="4" seed="15" stitchTiles="stitch" x="0%" y="0%" width="100%" height="100%" result="turbulence"/>
			<feSpecularLighting surfaceScale="20" specularConstant="1.2" specularExponent="20" lighting-color="hsla(240, 100%, 14%, 1)" x="0%" y="0%" width="100%" height="100%" in="turbulence" result="specularLighting">
				<feDistantLight azimuth="3" elevation="120"/>
			</feSpecularLighting>
		</filter>
	</defs>
	<rect width="700" height="700" fill="hsla(40, 18%, 98%)"/>
	<rect width="700" height="700" fill="hsl(180, 50%, 50%)" filter="url(#nnnoise-filter)"/>
</svg>